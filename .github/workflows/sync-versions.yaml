name: Sync Babelfish derived variables

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/build-and-push.yaml"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Run sync script
        run: python3 .github/scripts/sync-babelfish-vars.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/build-and-push.yaml
          git diff --cached --quiet || git commit -m "chore: sync babelfish derived variables"
          git push
